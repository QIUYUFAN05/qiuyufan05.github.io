<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qiuyu Fan</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background-color: white;
      color: black;
      font-size: 16px;
    }

    a {
      color: #1f4fff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      display: flex;
      max-width: 850px;
      margin: 45px auto;
    }

    .sidebar {
      width: 120px;
      padding-top: 55px;
      text-align: center;
      font-size: 17px;
    }

    .main {
      flex: 1;
      padding-left: 35px;
    }

    h1 {
      font-size: 27px;
      font-weight: normal;
      margin: 0 0 8px 0;
      border-bottom: 3px double #ccc;
      padding-bottom: 8px;
    }

    .intro {
      margin-top: 45px;
      max-width: 500px;
      font-size: 17px;
      line-height: 1.35;
    }

    .intro strong {
      font-size: 18px;
    }

    .intro ul {
      list-style-type: disc;
      padding-left: 18px;
      margin-top: 4px;
    }

    .intro li {
      margin-bottom: 3px;
    }

    h2 {
      font-size: 24px;
      font-weight: normal;
      font-style: italic;
      margin-top: 65px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }

    .section-content {
      min-height: 100px;
    }

    @media (max-width: 700px) {
      .container {
        flex-direction: column;
        margin: 25px;
      }

      .sidebar {
        width: 100%;
        text-align: left;
        padding-top: 10px;
        margin-bottom: 20px;
      }

      .main {
        padding-left: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <nav class="sidebar">
      <a href="#home">Home</a>
    </nav>

    <main class="main">
      <h1>Qiuyu Fan</h1>

      <section id="home" class="intro">
        <strong>Qiuyu Fan</strong>
        <ul>
          <li>First Year PhD Student</li>
          <li>Department of Computational Applied Mathematics and Operations Research</li>
          <li>Rice University, Houston, Texas</li>
          <li>Email:qf3@rice.edu</li>
          <li><a href="#">[CV]</a></li>
        </ul>
      </section>


    </main>

  </div>
</body>
</html>
